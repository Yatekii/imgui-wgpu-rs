[licenses]
allow = [
    "Apache-2.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]

[bans]
multiple-versions = "deny"
skip = [
    { name = "bitflags", version = "1.3.2", reason = "imgui depends on bitflags 1.x" },
    { name = "foldhash", version = "0.1.5", reason = "transitive dependency version mismatch" },
    { name = "hashbrown", version = "0.15.5", reason = "transitive dependency version mismatch" },
    { name = "jni-sys", version = "0.3.1", reason = "Using semver trick to depend on 0.4.1" },
]

[sources]
unknown-registry = "deny"
unknown-git = "allow"

[advisories]
ignore = [
    # paste is unmaintained, but is complete.
    "RUSTSEC-2024-0436",
]
